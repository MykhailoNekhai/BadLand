<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BADLAND — Change Email</title>
    <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
    <div class="scene">
        <div class="sun-glow"></div>
        <div class="ground"></div>
        <div class="vignette"></div>
        <div class="silhouette silhouette-left"></div>
        <div class="silhouette silhouette-right"></div>
        <div class="motes" aria-hidden="true">
            <span style="--x:8%;--y:18%;--d:7s;--s:14px"></span>
            <span style="--x:22%;--y:62%;--d:9s;--s:10px"></span>
            <span style="--x:38%;--y:8%;--d:11s;--s:16px"></span>
            <span style="--x:71%;--y:24%;--d:8s;--s:12px"></span>
            <span style="--x:84%;--y:48%;--d:10s;--s:18px"></span>
            <span style="--x:54%;--y:88%;--d:13s;--s:14px"></span>
            <span style="--x:6%;--y:78%;--d:12s;--s:10px"></span>
            <span style="--x:92%;--y:80%;--d:9s;--s:12px"></span>
            <span style="--x:48%;--y:36%;--d:14s;--s:8px"></span>
        </div>
    </div>

    <main class="page">
        <header class="title-area">
            <h1 class="brand">BADLAND</h1>
        </header>

        <section class="card">
            <div class="card-inner">
                <div class="card-header">
                    <div class="card-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="5" width="18" height="14" rx="2"/>
                            <path d="m3 7 9 6 9-6"/>
                        </svg>
                    </div>
                    <div class="card-titles">
                        <h2 class="card-title">CONFIRM EMAIL CHANGE</h2>
                        <p class="card-subtitle">Confirm the new email for your account.</p>
                    </div>
                </div>

                <div id="confirmStage">
                    <div class="email-box">
                        <div class="label">New email</div>
                        <div class="value" id="newEmailLabel">loading...</div>
                    </div>

                    <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>

                    <button type="button" id="confirmBtn" class="btn btn-primary">
                        <span class="btn-label">CONFIRM CHANGE</span>
                    </button>

                    <div class="divider">
                        <span class="divider-line"></span>
                        <span class="divider-text">OR</span>
                        <span class="divider-line"></span>
                    </div>

                    <a href="../../" class="btn btn-ghost">
                        <span class="arrow">&larr;</span>
                        <span>Return to game</span>
                    </a>
                </div>

                <div id="resultStage" class="status-block" hidden>
                    <div class="status-icon" id="statusIcon" aria-hidden="true"></div>
                    <p class="status-text" id="statusText"></p>
                    <p class="status-detail" id="statusDetail"></p>
                    <a href="../../" class="btn btn-ghost" style="margin-top: 12px;">
                        <span class="arrow">&larr;</span>
                        <span>Return to game</span>
                    </a>
                </div>

                <p class="footnote">
                    <span class="footnote-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/>
                        </svg>
                    </span>
                    This link is one-time use and expires automatically.
                </p>
            </div>
        </section>

        <footer class="page-footer">
            &copy; 2026 BADLAND. All rights reserved.
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
