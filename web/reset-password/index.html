<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BADLAND — Reset Password</title>
    <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
    <div class="scene">
        <div class="sun-glow"></div>
        <div class="ground"></div>
        <div class="vignette"></div>
        <div class="silhouette silhouette-left"></div>
        <div class="silhouette silhouette-right"></div>
        <div class="motes" aria-hidden="true">
            <span style="--x:8%;--y:18%;--d:7s;--s:14px"></span>
            <span style="--x:22%;--y:62%;--d:9s;--s:10px"></span>
            <span style="--x:38%;--y:8%;--d:11s;--s:16px"></span>
            <span style="--x:71%;--y:24%;--d:8s;--s:12px"></span>
            <span style="--x:84%;--y:48%;--d:10s;--s:18px"></span>
            <span style="--x:54%;--y:88%;--d:13s;--s:14px"></span>
            <span style="--x:6%;--y:78%;--d:12s;--s:10px"></span>
            <span style="--x:92%;--y:80%;--d:9s;--s:12px"></span>
            <span style="--x:48%;--y:36%;--d:14s;--s:8px"></span>
        </div>
    </div>

    <main class="page">
        <header class="title-area">
            <h1 class="brand">BADLAND</h1>
        </header>

        <section class="card">
            <div class="card-inner">
                <div class="card-header">
                    <div class="card-icon" aria-hidden="true">
                        <svg viewBox="0 0 32 32" fill="currentColor">
                            <path d="M16 4c-4 0-7 3-7 7v3H8c-1 0-2 1-2 2v11c0 1 1 2 2 2h16c1 0 2-1 2-2V16c0-1-1-2-2-2h-1v-3c0-4-3-7-7-7zm0 3c2 0 4 2 4 4v3h-8v-3c0-2 2-4 4-4z"/>
                        </svg>
                    </div>
                    <div class="card-titles">
                        <h2 class="card-title">RESET YOUR PASSWORD</h2>
                        <p class="card-subtitle">Enter a new password for your account.</p>
                    </div>
                </div>

                <form id="resetForm" class="form" novalidate>
                    <div class="field">
                        <span class="field-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="4" y="11" width="16" height="10" rx="2"/>
                                <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
                            </svg>
                        </span>
                        <input type="password" id="newPassword" name="newPassword" placeholder="New password" autocomplete="new-password" required minlength="8">
                    </div>

                    <div class="field">
                        <span class="field-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="4" y="11" width="16" height="10" rx="2"/>
                                <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
                            </svg>
                        </span>
                        <input type="password" id="repeatPassword" name="repeatPassword" placeholder="Repeat password" autocomplete="new-password" required minlength="8">
                    </div>

                    <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>

                    <button type="submit" id="submitBtn" class="btn btn-primary">
                        <span class="btn-label">RESET PASSWORD</span>
                    </button>

                    <div class="divider">
                        <span class="divider-line"></span>
                        <span class="divider-text">OR</span>
                        <span class="divider-line"></span>
                    </div>

                    <a href="../../" id="returnLink" class="btn btn-ghost">
                        <span class="arrow">&larr;</span>
                        <span>Return to game</span>
                    </a>
                </form>

                <p class="footnote">
                    <span class="footnote-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/>
                        </svg>
                    </span>
                    This link is secure and will expire automatically.
                </p>
            </div>
        </section>

        <footer class="page-footer">
            &copy; 2026 BADLAND. All rights reserved.
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
